<!DOCTYPE html>
<html>
<head>
    <title>My Cool Games</title>
    <style>
        body { background: #111; color: white; font-family: sans-serif; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
        .game-card { background: #222; padding: 10px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .game-card:hover { transform: scale(1.05); background: #333; }
        img { width: 100%; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Popular Games</h1>
    <div class="grid">
        <div class="game-card" onclick="window.location.href='play.html?game=slope'">
            <img src="https://placehold.co/200x150" alt="Slope">
            <p>Slope</p>
        </div>
        </div>
    <script>
function cloak(url) {
    let win = window.open();
    win.document.body.style.margin = '0';
    win.document.body.style.height = '100vh';
    let iframe = win.document.createElement('iframe');
    iframe.style.border = 'none';
    iframe.style.width = '100%';
    iframe.style.height = '100%';
    iframe.src = url;
    win.document.body.appendChild(iframe);
}
</script>
</body>
</html>
